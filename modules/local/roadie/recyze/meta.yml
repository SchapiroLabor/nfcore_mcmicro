---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "roadie_recyze"
## TODO nf-core: Add a description of the module and list keywords
description: write your description here
keywords:
  - sort
  - example
  - genomics
tools:
  - "roadie":
      ## TODO nf-core: Add a description and other details for the software below
      description: "Channel extraction, crop creation and preprocessing module"
      homepage: "https://mcmicro.org"
      documentation: "https://mcmicro.org"
      tool_dev_url: "https://github.com/labsyspharm/mcmicro"
      doi: "10.1038/s41592-021-01308-y"
      licence: ["MIT"]
      identifier:

## TODO nf-core: Add a description of all of the variables used as input
input:
  # Only when we have meta
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`

    - image:
        type: file
        description: Registered multiplexed immunofluorescence image
        pattern: "*.{tif,tiff}"

## TODO nf-core: Add a description of all of the variables used as output
output:
  - bam:
      #Only when we have meta
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.tif":
          type: file
          description: Extracted channels for segmentation as (pyramidal) TIFF
          pattern: "*.{tif}"

  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@kbestak"
maintainers:
  - "@kbestak"
